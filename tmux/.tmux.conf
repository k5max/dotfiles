#===== basic =====
# Change prefix key
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Default terminal is 256 colors
set -g default-terminal "xterm-256color"
# Add truecolor support
set-option -ga terminal-overrides ",*256col*:Tc"

# Add mouse support
set-option -g mouse on

# 设置窗口面板起始序号
set -g base-index 1  # 设置窗口(window)的起始下标为1
set -g pane-base-index 1  # 设置面板(pane)的起始下标为1

# tmux里vim按ESC反应慢
set -s escape-time 0

# refresh status bar every second
set-option -g status-interval 1

# 开启vi风格后，支持vi的C-d、C-u、hjkl等快捷键
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # 绑定v键为开始选择文本
bind-key -T copy-mode-vi 'y' send -X copy-selection # 绑定y键为复制选中文本

unbind -T copy-mode-vi MouseDragEnd1Pane

# ===== key bindings =====
# Use customize keys to splitting windows
unbind-key %
bind | split-window -h
unbind-key '"'
bind - split-window -v


# 面板(pane)切换
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R
bind -r e lastp # 切换到最后使用的窗口 
bind -r C-u swap-pane -U # 与前一个面板交换位置
bind -r C-d swap-pane -D # 与后一个面板交换位置

# 调整面板大小：绑定 h/j/k/l 键调整pane边缘
bind -r K resizep -U 5 # upward
bind -r J resizep -D 5 # downward
bind -r H resizep -L 5 # to the left
bind -r L resizep -R 5 # to the right

# Easy config reload
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ========== 自定义状态栏 =========
